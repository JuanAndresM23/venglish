<!DOCTYPE html>
<html>
<head>
    <title>Victoria's Calendar</title>
</head>
<body>

<h1>Victoria's Calendar</h1>

<table border="1">
    <tr>
        <th>Student</th>
        <th>Course</th>
        <th>Date</th>
        <th>Time</th>
    </tr>
    {% for r in reservations %}
    <tr>
        <td>{{ r[0] }}</td>
        <td>{{ r[1] }}</td>
        <td>{{ r[2] }}</td>
        <td>{{ r[3] }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
