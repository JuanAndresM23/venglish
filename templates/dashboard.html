<!doctype html>
<html>
<head>

<title>Class Calendar</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>
#calendar{
  max-width:900px;
  margin:40px auto;
  height:650px;
}
</style>

</head>

<body>

<h1>Victoria Class Calendar</h1>

<div id="calendar"></div>

<script>

document.addEventListener('DOMContentLoaded', function() {

let calendarEl = document.getElementById('calendar');

let calendar = new FullCalendar.Calendar(calendarEl, {

initialView: 'dayGridMonth',

headerToolbar:{
left:'prev,next today',
center:'title',
right:'dayGridMonth,timeGridWeek,timeGridDay'
},

events: {{ events | tojson | safe }},

eventClick:function(info){

let confirmDelete = confirm(
"Student: " + info.event.title + "\n" +
"Course: " + info.event.extendedProps.course + "\n" +
"Phone: " + info.event.extendedProps.phone + "\n" +
"Email: " + info.event.extendedProps.email + "\n\n" +
"Do you want to cancel this class?"
);

if(confirmDelete){

fetch("/delete_booking/" + info.event.id)
.then(response => response.text())
.then(data => {

info.event.remove();
alert("Class cancelled successfully");

});

}

}

});

calendar.render();

});

</script>

</body>
</html>
