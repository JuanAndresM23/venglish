<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registro de Estudiante</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>Registro de Estudiante</h1>
    <form action="{{ url_for('student_register') }}" method="POST">
        <label for="student_code">Código de Estudiante:</label>
        <input type="text" name="student_code" id="student_code" required><br><br>

        <label for="name">Nombre Completo:</label>
        <input type="text" name="name" id="name" required><br><br>

        <label for="email">Correo Electrónico:</label>
        <input type="email" name="email" id="email" required><br><br>

        <label for="password">Contraseña:</label>
        <input type="password" name="password" id="password" required><br><br>

        <button type="submit">Registrarse</button>
    </form>
    <p>Ya tienes cuenta? <a href="{{ url_for('student_login') }}">Inicia sesión aquí</a></p>
</body>
</html>
