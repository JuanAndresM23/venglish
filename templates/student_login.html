<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login de Estudiante</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>Login de Estudiante</h1>
    <form action="{{ url_for('student_login') }}" method="POST">
        <label for="student_code">Código de Estudiante:</label>
        <input type="text" name="student_code" id="student_code" required><br><br>

        <label for="password">Contraseña:</label>
        <input type="password" name="password" id="password" required><br><br>

        <button type="submit">Iniciar Sesión</button>
    </form>
    <p>No tienes cuenta? <a href="{{ url_for('student_register') }}">Regístrate aquí</a></p>
</body>
</html>
